<!DOCTYPE html>
<html>
<head>
<title>Student Grade Calculator</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#4CAF50,#2e7d32);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:35px;
    border-radius:10px;
    width:320px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
}

input{
    width:90%;
    padding:8px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:5px;
    margin-top:10px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#388e3c;
}

.result{
    margin-top:15px;
    padding:10px;
    background:#f2f2f2;
    border-radius:5px;
    white-space:pre-line;
}

.back{
    position:absolute;
    top:20px;
    left:20px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

</style>

</head>

<body>

<a class="back" href="index.html">⬅ Back to Portfolio</a>

<div class="container">

<h1>Grade Calculator</h1>

<input id="math" type="number" placeholder="Math Marks">

<input id="english" type="number" placeholder="English Marks">

<input id="physics" type="number" placeholder="Physics Marks">

<button onclick="calculate()">Calculate Grade</button>

<div id="output" class="result"></div>

</div>

<script>

function calculate(){

let math = Number(document.getElementById("math").value);
let english = Number(document.getElementById("english").value);
let physics = Number(document.getElementById("physics").value);

let total = math + english + physics;

let failed = [];

if(math < 32){
    failed.push("Math");
}

if(english < 32){
    failed.push("English");
}

if(physics < 32){
    failed.push("Physics");
}

let output = "";

if(failed.length > 0){

    output = "Result: Failed\n";
    output += "Failed in: " + failed.join(", ");

}
else{

    let percentage = total / 3;
    let grade;

    if(percentage >= 90){
        grade = "A+";
    }
    else if(percentage >= 80){
        grade = "A";
    }
    else if(percentage >= 70){
        grade = "B";
    }
    else if(percentage >= 60){
        grade = "C";
    }
    else if(percentage >= 50){
        grade = "D";
    }
    else{
        grade = "E";
    }

    output = "Result: Passed\n";
    output += "Percentage: " + percentage.toFixed(2) + "\n";
    output += "Grade: " + grade;
}

document.getElementById("output").innerText = output;

}

</script>

</body>
</html>
